<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recently Rented Movies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        const movieTitle = "Sample Movie Title"; // Replace or fetch from elsewhere

        async function rentMovie() {
            const response = await fetch(`/api/watch?title=${encodeURIComponent(movieTitle)}`, {
                method: 'POST'
            });

            const result = await response.text();
            alert(result);
            loadWatchlist();
        }

        async function loadWatchlist() {
            const response = await fetch("/api/watchlist");
            const movies = await response.json();
            const list = document.getElementById("watchlist");
            list.innerHTML = "";

            if (movies.length === 0) {
                list.innerHTML = "<p class='text-muted'>No movies rented yet.</p>";
                return;
            }

            movies.forEach(movieTitle => {
                const li = document.createElement("li");
                li.className = "list-group-item d-flex justify-content-between align-items-center";

                const titleSpan = document.createElement("span");
                titleSpan.textContent = movieTitle;

                const rateBtn = document.createElement("button");
                rateBtn.className = "btn btn-outline-primary btn-sm";
                rateBtn.textContent = "Rate & Review";
                rateBtn.onclick = function () {
                    window.location.href = `/review.html?title=${encodeURIComponent(movieTitle)}`;
                };

                li.appendChild(titleSpan);
                li.appendChild(rateBtn);
                list.appendChild(li);
            });
        }

        window.onload = loadWatchlist;
    </script>
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow-lg">
        <div class="card-body">
            <h2 class="card-title mb-4 text-center">Recently Rented Movies</h2>

            <!-- ✅ Rent Button only -->
            <div class="d-grid mb-4">
                <button class="btn btn-success" onclick="rentMovie()">Rent Movie</button>
            </div>

            <h4 class="mb-3">Top 5 Recent Rentals:</h4>
            <ul class="list-group" id="watchlist"></ul>
        </div>
    </div>
</div>
</body>
</html>
