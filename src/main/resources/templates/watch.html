<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recently Watched Movies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        async function watchMovie() {
            const title = document.getElementById("movieTitle").value;
            if (!title.trim()) {
                alert("Please enter a movie title.");
                return;
            }

            const response = await fetch(`/api/watch?title=${encodeURIComponent(title)}`, {
                method: 'POST'
            });

            const result = await response.text();
            alert(result);
            document.getElementById("movieTitle").value = "";
            loadWatchlist();
        }

        async function loadWatchlist() {
            const response = await fetch("/api/watchlist");
            const movies = await response.json();
            const list = document.getElementById("watchlist");
            list.innerHTML = "";

            if (movies.length === 0) {
                list.innerHTML = "<p class='text-muted'>No movies watched yet.</p>";
                return;
            }

            movies.forEach(movie => {
                const li = document.createElement("li");
                li.className = "list-group-item";
                li.textContent = movie;
                list.appendChild(li);
            });
        }

        window.onload = loadWatchlist;
    </script>
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow-lg">
        <div class="card-body">
            <h2 class="card-title mb-4 text-center">Recently Watched Movies</h2>

            <div class="mb-3">
                <input type="text" id="movieTitle" class="form-control" placeholder="Enter a movie title">
            </div>

            <div class="d-grid">
                <button class="btn btn-success" onclick="watchMovie()">Watch Movie</button>
            </div>

            <hr class="my-4">

            <h4>Top 5 Recent Movies:</h4>
            <ul class="list-group" id="watchlist"></ul>
        </div>
    </div>
</div>
</body>
</html>
