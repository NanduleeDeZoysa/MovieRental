<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Movie Review</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body {
            background: linear-gradient(135deg, #1a1c2c 0%, #2d3436 100%);
            color: #fff;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border-radius: 15px;
        }
        .card-body {
            padding: 2rem;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #ffd700;
            box-shadow: 0 0 0 0.25rem rgba(255, 215, 0, 0.25);
            color: #fff;
        }
        .form-label {
            color: #ffd700;
            font-weight: 500;
        }
        .star-rating {
            color: #ffd700;
            font-size: 32px;
            cursor: pointer;
            display: flex;
            gap: 10px;
        }
        .star {
            transition: all 0.3s ease;
            transform-origin: center;
        }
        .star:hover {
            transform: scale(1.2);
        }
        .btn-primary {
            background: linear-gradient(45deg, #ffd700, #ffa500);
            border: none;
            padding: 12px 30px;
            font-weight: 600;
            border-radius: 25px;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
            background: linear-gradient(45deg, #ffa500, #ffd700);
        }
        .nav-link {
            color: #ffd700;
            text-decoration: none;
            margin: 0 10px;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        .nav-link:hover {
            color: #ffa500;
            transform: translateY(-2px);
        }
        .page-title {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(45deg, #ffd700, #ffa500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
        }
        textarea {
            min-height: 120px;
            resize: vertical;
        }
    </style>
</head>
<body>
    <div class="container mt-5 animate__animated animate__fadeIn">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="page-title">Add Movie Review</h2>
            <div>
                <a href="/reviews/view" class="nav-link">View All Reviews</a>
                <a href="/" class="nav-link">Back to Home</a>
            </div>
        </div>
        
        <!-- Add Review Form -->
        <div class="card animate__animated animate__fadeInUp animate__delay-1s">
            <div class="card-body">
                <form id="reviewForm">
                    <div class="mb-4">
                        <label for="movieName" class="form-label">Movie Name</label>
                        <input type="text" class="form-control form-control-lg" id="movieName" required 
                               placeholder="Enter movie name">
                    </div>
                    <div class="mb-4">
                        <label for="review" class="form-label">Your Review</label>
                        <textarea class="form-control form-control-lg" id="review" required
                                  placeholder="Share your thoughts about the movie..."></textarea>
                    </div>
                    <div class="mb-4">
                        <label class="form-label d-block mb-3">Your Rating</label>
                        <div class="star-rating" id="ratingStars">
                            <span class="star" data-rating="1">★</span>
                            <span class="star" data-rating="2">★</span>
                            <span class="star" data-rating="3">★</span>
                            <span class="star" data-rating="4">★</span>
                            <span class="star" data-rating="5">★</span>
                        </div>
                        <input type="hidden" id="rating" value="0">
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100">Submit Review</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Star rating functionality with animation
        const stars = document.querySelectorAll('.star');
        const ratingInput = document.getElementById('rating');
        
        stars.forEach(star => {
            star.addEventListener('click', () => {
                const rating = star.getAttribute('data-rating');
                ratingInput.value = rating;
                updateStars(rating);
                
                // Add pulse animation to clicked star
                star.classList.add('animate__animated', 'animate__pulse');
                setTimeout(() => {
                    star.classList.remove('animate__animated', 'animate__pulse');
                }, 500);
            });
        });

        function updateStars(rating) {
            stars.forEach(star => {
                const starRating = star.getAttribute('data-rating');
                if (starRating <= rating) {
                    star.style.color = '#ffd700';
                    star.style.transform = 'scale(1.1)';
                } else {
                    star.style.color = 'rgba(255, 255, 255, 0.2)';
                    star.style.transform = 'scale(1)';
                }
            });
        }

        // Form submission with animation
        document.getElementById('reviewForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitButton = e.target.querySelector('button[type="submit"]');
            submitButton.disabled = true;
            submitButton.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Submitting...';
            
            const review = {
                movieName: document.getElementById('movieName').value,
                review: document.getElementById('review').value,
                rating: parseInt(document.getElementById('rating').value)
            };

            try {
                await fetch('/api/reviews', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(review)
                });

                // Success animation
                const form = document.getElementById('reviewForm');
                form.classList.add('animate__animated', 'animate__fadeOutUp');
                
                setTimeout(() => {
                    window.location.href = '/reviews/view';
                }, 500);
            } catch (error) {
                console.error('Error:', error);
                submitButton.disabled = false;
                submitButton.innerHTML = 'Submit Review';
                alert('Error submitting review');
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
