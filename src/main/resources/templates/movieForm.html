<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Add Movie</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
  <h1>Add Movie</h1>
  <form th:action="@{/movies/add}" th:object="${movie}" method="post">
    <div class="mb-3">
      <label class="form-label">Title</label>
      <input class="form-control" th:field="*{title}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Genre</label>
      <input class="form-control" th:field="*{genre}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Release Year</label>
      <input type="number" class="form-control" th:field="*{year}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Rating</label>
      <input type="number" step="0.1" min="0" max="10" class="form-control" th:field="*{rating}" required>
      <small class="form-text text-muted">Enter a rating between 0 and 10.</small>
    </div>
    <button type="submit" class="btn btn-success">Add</button>
    <a href="/movies" class="btn btn-secondary">Back</a>
  </form>
</div>
</body>
</html>
