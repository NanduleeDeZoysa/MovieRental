<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Movie Reviews</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body {
            background: linear-gradient(135deg, #1a1c2c 0%, #2d3436 100%);
            color: #fff;
            min-height: 100vh;
            padding-bottom: 2rem;
        }
        .container {
            max-width: 1000px;
        }
        .review-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border-radius: 15px;
            margin-bottom: 25px;
            transition: all 0.3s ease;
        }
        .review-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.45);
        }
        .card-body {
            padding: 2rem;
        }
        .nav-link {
            color: #ffd700;
            text-decoration: none;
            margin: 0 10px;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        .nav-link:hover {
            color: #ffa500;
            transform: translateY(-2px);
        }
        .page-title {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(45deg, #ffd700, #ffa500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
        }
        .movie-title {
            color: #ffd700;
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }
        .rating-badge {
            background: linear-gradient(45deg, #ffd700, #ffa500);
            color: #1a1c2c;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 1rem;
        }
        .review-text {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 1rem;
        }
        .review-meta {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }
        .star-icon {
            color: #ffd700;
        }
        .individual-review {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 1.5rem;
            margin-top: 1rem;
            transition: all 0.3s ease;
        }
        .individual-review:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        .alert {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            backdrop-filter: blur(10px);
        }
        .alert a {
            color: #ffd700;
            text-decoration: none;
            font-weight: 500;
        }
        .alert a:hover {
            color: #ffa500;
        }
    </style>
</head>
<body>
    <div class="container mt-5 animate__animated animate__fadeIn">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="page-title">Movie Reviews</h2>
            <div>
                <a href="/reviews/add" class="nav-link">Add New Review</a>
                <a href="/" class="nav-link">Back to Home</a>
            </div>
        </div>

        <!-- Movie List -->
        <div id="movieList"></div>
    </div>

    <script>
        // Load and display movies
        async function loadMovies() {
            try {
                const response = await fetch('/api/reviews/movies');
                const movies = await response.json();
                const movieListElement = document.getElementById('movieList');
                movieListElement.innerHTML = '';

                if (movies.length === 0) {
                    movieListElement.innerHTML = `
                        <div class="alert animate__animated animate__fadeIn">
                            <h4 class="alert-heading">No Reviews Yet!</h4>
                            <p>Be the first to share your thoughts about a movie.</p>
                            <hr>
                            <p class="mb-0">
                                <a href="/reviews/add" class="alert-link">Add a Review</a>
                                and start the conversation!
                            </p>
                        </div>
                    `;
                    return;
                }

                movies.forEach(async (movie, index) => {
                    const statsResponse = await fetch(`/api/reviews/movie/${encodeURIComponent(movie)}`);
                    const stats = await statsResponse.json();
                    
                    const movieCard = document.createElement('div');
                    movieCard.className = 'review-card animate__animated animate__fadeInUp';
                    movieCard.style.animationDelay = `${index * 0.1}s`;
                    
                    const stars = '★'.repeat(Math.round(stats.averageRating)) + 
                                '☆'.repeat(5 - Math.round(stats.averageRating));
                    
                    movieCard.innerHTML = `
                        <div class="card-body">
                            <h3 class="movie-title">${movie}</h3>
                            <div class="rating-badge">
                                <span class="star-icon">${stars}</span>
                                ${stats.averageRating.toFixed(1)} / 5.0
                                <span class="ms-2">(${stats.numberOfReviews} reviews)</span>
                            </div>
                            <div class="reviews">
                                ${stats.reviews.map(review => `
                                    <div class="individual-review animate__animated animate__fadeIn">
                                        <p class="review-text">${review.review}</p>
                                        <div class="review-meta">
                                            Rating: <span class="star-icon">★</span> ${review.rating}/5
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                    movieListElement.appendChild(movieCard);
                });
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('movieList').innerHTML = `
                    <div class="alert animate__animated animate__fadeIn">
                        <h4 class="alert-heading">Oops! Something went wrong</h4>
                        <p>We're having trouble loading the reviews right now.</p>
                        <hr>
                        <p class="mb-0">Please try again later or <a href="/reviews/add" class="alert-link">add a new review</a>.</p>
                    </div>
                `;
            }
        }

        // Initial load
        loadMovies();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
