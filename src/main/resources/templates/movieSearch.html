<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Search Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .error-message {
            color: #dc3545;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <div class="d-flex justify-content-between align-items-center">
                <h1 class="h4 mb-0">Search Results for: <span th:text="${searchQuery}"></span></h1>
                <a th:href="@{/movies/catalog}" class="btn btn-light btn-sm">Back to Catalog</a>
            </div>
        </div>

        <div class="card-body">

            <div th:if="${error}" class="alert alert-danger error-message" th:text="${error}"></div>

            <div th:if="${not #lists.isEmpty(movies)}" class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                    <tr>
                        <th>Title</th>
                        <th>Genre</th>
                        <th>Year</th>
                        <th>Rating</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="movie : ${movies}">
                        <td th:text="${movie.title}"></td>
                        <td th:text="${movie.genre}"></td>
                        <td th:text="${movie.year}"></td>
                        <td th:text="${movie.rating}"></td>
                        <td>
                            <a th:href="@{/movies/view/{id}(id=${movie.id})}" class="btn btn-info btn-sm">View</a>
                            <form th:action="@{/movies/watch/{id}(id=${movie.id})}" method="post" style="display:inline;">
                                <button type="submit" class="btn btn-sm"
                                        th:class="${watchlist.contains(movie.id)} ? 'btn-success' : 'btn-outline-success'">
                                    <i class="fas" th:class="${watchlist.contains(movie.id)} ? 'fa-check' : 'fa-plus'"></i>
                                    Watchlist
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${#lists.isEmpty(movies)}" class="text-center py-4">
                <div class="alert alert-info">
                    No movies found matching "<span th:text="${searchQuery}"></span>"
                </div>
                <a th:href="@{/movies/catalog}" class="btn btn-primary">Back to Catalog</a>
            </div>
        </div>
    </div>
</div>


<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
