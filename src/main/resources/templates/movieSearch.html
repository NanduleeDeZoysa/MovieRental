<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Search Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .error-message {
            color: #dc3545;
            margin-bottom: 1rem;
        }
        .action-buttons {
            display: flex;
            gap: 5px;
        }
        .action-buttons .btn {
            padding: 0.25rem 0.5rem;
            font-size: 0.875rem;
        }
    </style>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <div class="d-flex justify-content-between align-items-center">
                <h1 class="h4 mb-0">Search Results for: <span th:text="${searchQuery}"></span></h1>
                <a th:href="@{/movies/catalog}" class="btn btn-light btn-sm">Back to Catalog</a>
            </div>
        </div>

        <div class="card-body">
            <div th:if="${error}" class="alert alert-danger error-message" th:text="${error}"></div>

            <div th:if="${not #lists.isEmpty(movies)}" class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                    <tr>
                        <th>Title</th>
                        <th>Genre</th>
                        <th>Year</th>
                        <th>Rating</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="movie : ${movies}">
                        <td th:text="${movie.title}"></td>
                        <td th:text="${movie.genre}"></td>
                        <td th:text="${movie.year}"></td>
                        <td>
                            <div class="rating-stars">
                                <span th:each="i : ${#numbers.sequence(1, 5)}">
                                    <i th:class="${i <= movie.rating} ? 'fas fa-star' : 'far fa-star'"></i>
                                </span>
                                <span th:text="'(' + ${movie.rating} + '/5)'"></span>
                            </div>
                        </td>
                        <td>
                            <div class="action-buttons">
                                <a th:href="@{/movies/view/{id}(id=${movie.id})}" class="btn btn-info btn-sm">
                                    <i class="fas fa-eye"></i> View
                                </a>

                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${#lists.isEmpty(movies)}" class="text-center py-4">
                <div class="alert alert-info">
                    No movies found matching "<span th:text="${searchQuery}"></span>"
                </div>
                <a th:href="@{/movies/catalog}" class="btn btn-primary">Back to Catalog</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
