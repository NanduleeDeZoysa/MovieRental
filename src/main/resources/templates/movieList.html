<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>All Movies</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    .fixed-bottom-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1000;
    }
    .rating-stars {
      color: gold;
    }
    .action-buttons {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .action-buttons .btn {
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.25rem 0.5rem;
      font-size: 0.875rem;
    }
  </style>
</head>
<body class="bg-light">
<div class="container py-5">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <div class="d-flex justify-content-between align-items-center">
        <h1 class="h4 mb-0">All Movies</h1>
        <a th:href="@{/movies/catalog}" class="btn btn-light btn-sm">Back to Catalog</a>
      </div>
    </div>

    <div class="card-body">
      <!-- Error/Success Messages -->
      <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
      <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

      <div th:if="${not #lists.isEmpty(movies)}" class="table-responsive">
        <table class="table table-striped table-hover">
          <thead class="table-dark">
          <tr>
            <th>Title</th>
            <th>Genre</th>
            <th>Year</th>
            <th>Rating</th>
            <th>Actions</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="movie : ${movies}">
            <td th:text="${movie.title}"></td>
            <td th:text="${movie.genre}"></td>
            <td th:text="${movie.year}"></td>
            <td>
              <div class="rating-stars">
                <span th:each="i : ${#numbers.sequence(1, 5)}">
                  <i th:class="${i <= movie.rating} ? 'fas fa-star' : 'far fa-star'"></i>
                </span>
                <span th:text="'(' + ${movie.rating} + '/5)'"></span>
              </div>
            </td>
            <td>
              <div class="action-buttons">
                <!-- View Button - Links to movieView.html -->
                <a th:href="@{/movies/view/{id}(id=${movie.id})}" class="btn btn-info btn-sm">
                  <i class="fas fa-eye"></i> View
                </a>

                <!-- Watchlist Button -->
                <!-- In your movieList.html, update the watchlist button section -->
                <!-- In your movieList.html, update the watchlist button section -->
                <form th:action="@{__${watchlist.contains(movie.id) ? '/movies/watch/remove/' + movie.id : '/movies/watch/' + movie.id}__}"
                      method="post">
                  <button type="submit" class="btn btn-sm"
                          th:class="${watchlist.contains(movie.id)} ? 'btn-success' : 'btn-outline-success'">
                    <i class="fas" th:class="${watchlist.contains(movie.id)} ? 'fa-check' : 'fa-plus'"></i>
                    <span th:text="${watchlist.contains(movie.id)} ? 'In Watchlist' : 'Watchlist'"></span>
                  </button>
                </form>

                <!-- Rent Button -->
                <a th:href="@{/movies/rent/{id}(id=${movie.id})}" class="btn btn-warning btn-sm">
                  <i class="fas fa-film"></i> Rent
                </a>
              </div>
            </td>
          </tr>
          </tbody>
        </table>
      </div>

      <div th:if="${#lists.isEmpty(movies)}" class="text-center py-4">
        <div class="alert alert-info">No movies available.</div>
      </div>
    </div>
  </div>
</div>

<!-- Back to Top Button -->
<div class="fixed-bottom-btn">
  <a href="#" class="btn btn-primary" onclick="window.scrollTo(0,0)">
    <i class="fas fa-arrow-up"></i> Back to Top
  </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
