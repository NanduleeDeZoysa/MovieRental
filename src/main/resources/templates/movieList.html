<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Movie List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <div class="d-flex justify-content-between align-items-center">
                <h1 class="h4 mb-0">Movie List</h1>
                <a th:href="@{/movies/add}" class="btn btn-light btn-sm">Add Movie</a>
            </div>
        </div>

        <div class="card-body">
            <!-- Check if movies is not empty -->
            <div th:if="${not #lists.isEmpty(movies)}">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                        <tr>
                            <th>Title</th>
                            <th>Genre</th>
                            <th>Year</th>
                            <th>Rating</th>
                            <th>Actions</th> <!-- New column for Edit/Delete actions -->
                        </tr>
                        </thead>
                        <tbody>
                        <!-- Iterate over the movies list -->
                        <tr th:each="movie : ${movies}">
                            <td th:text="${movie.title}"></td>
                            <td th:text="${movie.genre}"></td>
                            <td th:text="${movie.year}"></td>
                            <td th:text="${movie.rating}"></td>
                            <td>
                                <!-- Edit Button -->
                                <a th:href="@{/movies/edit/{id}(id=${movie.id})}" class="btn btn-warning btn-sm">Edit</a>
                                <!-- Delete Button -->
                                <a th:href="@{/movies/delete/{id}(id=${movie.id})}" class="btn btn-danger btn-sm"
                                   onclick="return confirm('Are you sure you want to delete this movie?');">Delete</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- If no movies -->
            <div th:if="${#lists.isEmpty(movies)}" class="text-center py-4">
                <div class="alert alert-info">
                    No movies found. <a th:href="@{/movies/add}" class="alert-link">Add a movie</a> to get started.
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
