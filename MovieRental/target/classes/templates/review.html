<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Movie Review</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for stars -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .rating {
            display: inline-block;
            position: relative;
            height: 50px;
            line-height: 50px;
            font-size: 30px;
        }
        .rating label {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            cursor: pointer;
        }
        .rating label:last-child {
            position: static;
        }
        .rating label:nth-child(1) { z-index: 5; }
        .rating label:nth-child(2) { z-index: 4; }
        .rating label:nth-child(3) { z-index: 3; }
        .rating label:nth-child(4) { z-index: 2; }
        .rating label:nth-child(5) { z-index: 1; }
        .rating label input {
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
        }
        .rating label .icon {
            float: left;
            color: transparent;
        }
        .rating label:last-child .icon {
            color: #000;
        }
        .rating:not(:hover) label input:checked ~ .icon,
        .rating:hover label:hover input ~ .icon {
            color: #ffd700;
        }
        .rating label input:focus:not(:checked) ~ .icon:last-child {
            color: #000;
            text-shadow: 0 0 5px #ffd700;
        }
        .movie-poster {
            max-width: 200px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .review-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .gradient-background {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 40px 0;
        }
    </style>
</head>
<body class="gradient-background">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="review-card p-4">
                <div class="text-center mb-4">
                    <h2 class="display-6">Write a Review</h2>
                    <p class="text-muted">Share your thoughts about the movie</p>
                </div>

                <div class="row mb-4">
                    <div class="col-md-4 text-center">
                        <img th:src="${movie.posterUrl}" id="moviePoster" class="movie-poster mb-3" alt="Movie Poster">
                        <h5 th:text="${movie.title}" id="movieTitle" class="mb-2"></h5>
                    </div>
                    <div class="col-md-8">
                        <form id="reviewForm" th:action="@{/review}" th:object="${review}" method="post">
                            <input type="hidden" th:field="*{movieId}">

                            <div class="mb-4">
                                <label class="form-label">Your Rating</label>
                                <div class="rating">
                                    <label th:each="i : ${#numbers.sequence(1, 5)}">
                                        <input type="radio" th:field="*{rating}" th:value="${i}" />
                                        <span class="icon" th:each="star : ${#numbers.sequence(1, i)}">★</span>
                                    </label>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="comment" class="form-label">Your Review</label>
                                <textarea
                                        class="form-control"
                                        th:field="*{comment}"
                                        rows="4"
                                        placeholder="What did you think about the movie?"
                                        required></textarea>
                                <div class="text-danger" th:if="${#fields.hasErrors('comment')}" th:errors="*{comment}"></div>
                            </div>

                            <div class="mb-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" th:field="*{anonymous}">
                                    <label class="form-check-label" for="anonymous">
                                        Post as Anonymous
                                    </label>
                                </div>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg">Submit Review</button>
                                <a th:href="@{/reviews(movie=${movie.title})}" class="btn btn-outline-secondary">View All Reviews</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    // Form validation
    document.getElementById('reviewForm').onsubmit = function(e) {
        const rating = document.querySelector('input[name="rating"]:checked');
        if (!rating) {
            e.preventDefault();
            alert('Please select a rating');
            return false;
        }
        return true;
    }
</script>
</body>
</html>
